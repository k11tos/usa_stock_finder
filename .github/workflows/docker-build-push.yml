name: Docker Build & Push to GHCR

# 이 워크플로우는 Docker 이미지 빌드와 GitHub Container Registry에 푸시를 담당합니다
# ARM64 (Raspberry Pi 등) 및 AMD64 플랫폼을 지원합니다
# 안전 규칙:
# - 프로덕션(latest 태그/라즈베리파이 배포)은 main 브랜치에서 수동 실행한 경우에만 수행합니다.
# - non-main 수동 실행은 빌드/브랜치 태그 푸시까지만 허용합니다.

on:
  workflow_dispatch:  # 수동 실행 가능

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: usa_stock_finder

permissions:
  contents: read
  packages: write  # GitHub Container Registry에 푸시하기 위해 필요

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ARM 빌드를 위한 QEMU 설정 (Raspberry Pi 등 지원)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (for tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            # 프로덕션 latest 태그는 main에서만 갱신
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"

  deploy-to-raspberry-pi:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    needs: build-and-push
    # 프로덕션 배포는 main 브랜치 수동 실행에서만 허용
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Raspberry Pi
        uses: appleboy/ssh-action@v1.2.3
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.PI_SSH_KEY }}
          port: ${{ secrets.PI_PORT }}
          script: |
            set -eu
            cd ${{ secrets.PI_PROJECT_PATH }}
            docker --version
            docker compose version
            docker login -u ${{ github.actor }} --password-stdin ${{ env.REGISTRY }} <<GITHUB_TOKEN_EOF
            ${{ secrets.GITHUB_TOKEN }}
            GITHUB_TOKEN_EOF
            docker pull ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            docker compose rm -sf stock || true
            docker compose up -d stock
            docker image prune -f
            echo "== docker compose ps -a =="
            docker compose ps -a

            container_id=$(docker compose ps -aq stock)
            if [ -z "$container_id" ]; then
              echo "ERROR: stock service container was not created."
              exit 1
            fi

            container_state=$(docker inspect -f '{{.State.Status}}' "$container_id")
            health_state=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")
            exit_code=$(docker inspect -f '{{.State.ExitCode}}' "$container_id")
            echo "stock container state: $container_state (exit_code=$exit_code, health=$health_state)"
            # main.py may exit immediately outside the execution window, so exited(0) is a valid success.
            case "$container_state" in
              running)
                echo "stock service is running."
                ;;
              exited)
                if [ "$exit_code" -eq 0 ]; then
                  echo "stock service finished with exit code 0 (valid batch success)."
                else
                  echo "ERROR: stock service exited with non-zero code: $exit_code"
                  docker logs --tail 100 "$container_id" || true
                  exit 1
                fi
                ;;
              restarting|dead|created)
                echo "ERROR: stock service is in invalid post-deploy state: $container_state"
                docker logs --tail 100 "$container_id" || true
                exit 1
                ;;
              *)
                echo "ERROR: stock service is in unexpected state: $container_state"
                docker logs --tail 100 "$container_id" || true
                exit 1
                ;;
            esac

            echo "stock container health: $health_state"

            echo "== recent stock service logs =="
            docker compose logs --tail 100 stock || docker logs --tail 100 "$container_id" || true
            docker ps
            docker logout ${{ env.REGISTRY }}

      # 선택사항: Slack 알림 (SLACK_WEBHOOK_URL secret이 설정된 경우에만)
      # 주의: secrets.SLACK_WEBHOOK_URL을 GitHub 저장소 Settings > Secrets에 추가해야 합니다
      - name: Slack Notification (Success)
        if: success() && github.event_name != 'pull_request'
        uses: rtCamp/action-slack-notify@v2
        continue-on-error: true  # Slack 알림 실패해도 워크플로우는 계속 진행
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Slack Notification (Failure)
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        continue-on-error: true  # Slack 알림 실패해도 워크플로우는 계속 진행
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
